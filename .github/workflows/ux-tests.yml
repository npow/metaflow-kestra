name: UX Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"  # nightly — catches upstream metaflow regressions
  workflow_dispatch:

env:
  METAFLOW_DEFAULT_METADATA: local
  METAFLOW_DEFAULT_DATASTORE: local
  METAFLOW_DEFAULT_ENVIRONMENT: local

jobs:
  # Runner tests execute flows locally — no Kestra scheduler needed.
  runner-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Pin Metaflow local datastore root
        run: echo "METAFLOW_DATASTORE_SYSROOT_LOCAL=$HOME" >> "$GITHUB_ENV"

      - uses: Netflix/metaflow/.github/actions/run-ux-tests@master
        with:
          metaflow-ref: master
          extra-install: "."
          use-sudo: "false"
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          pytest-args: "-n 4 -v --tb=short --timeout=180 -k 'runner' --cov-fail-under=0"
          ux-test-config: |
            backends:
              - name: kestra
                scheduler_type: kestra
                cluster: null
                decospec: null
                deploy_args:
                  kestra_host: http://localhost:8090
                  kestra_user: admin@kestra.io
                  kestra_password: Kestra1234!
                enabled: true

  # Each deployer test gets its own worker with a fresh Kestra instance.
  # This eliminates serialization (xdist_group) and lets all tests run in parallel.
  deployer-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        test:
          - test_hello_world
          - test_hello_project
          - test_from_deployment
          - test_retry
          - test_resources
          - test_catch
          - test_timeout
          - test_config_simple_default
          - test_config_simple_config_value
          - test_config_simple_config
          - test_mutable_flow_default
          - test_mutable_flow_config_value
          - test_config_corner_cases
          - test_branch
          - test_foreach
          - test_multibody_foreach
          - test_condition
          - test_retry_foreach
          - test_nested_foreach
          - test_resume_hello_world
          - test_resume_foreach
        include:
          # scheduler_only tests have no exec_mode fixture so their pytest ID
          # is [kestra], not [kestra-deployer]. The pytest -k selector below
          # uses scheduler_only to drop the ` and deployer` suffix.
          - test: test_resume_hello_world
            scheduler_only: true
          - test: test_resume_foreach
            scheduler_only: true
          # `test_retry` is a substring of `test_retry_foreach`, so the
          # plain -k 'test_retry and deployer' selector matches BOTH and
          # the test_retry job ran the slow foreach variant twice
          # (~17min total, well over the 900s timeout). Exclude the
          # foreach variant explicitly so each job runs exactly one test.
          - test: test_retry
            extra_filter: " and not test_retry_foreach"

    env:
      COMPOSE_FILE: docker-compose.yaml:docker-compose.gha.yml
      KESTRA_HOST: http://localhost:8090
      KESTRA_USER: admin@kestra.io
      KESTRA_PASSWORD: Kestra1234!

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Pin Metaflow local datastore root
        run: echo "METAFLOW_DATASTORE_SYSROOT_LOCAL=$HOME" >> "$GITHUB_ENV"

      - name: Build Kestra Docker image
        run: docker build -t kestra-metaflow:latest -f Dockerfile.kestra-dev .

      - name: Start Kestra
        run: docker compose up -d

      - name: Wait for Kestra to be healthy
        run: |
          CONTAINER_ID=$(docker compose ps -q kestra)
          timeout 300 bash -c '
            while true; do
              STATUS=$(docker inspect --format="{{.State.Health.Status}}" '"$CONTAINER_ID"' 2>/dev/null)
              [ "$STATUS" = "healthy" ] && break
              echo "  health: $STATUS"
              sleep 10
            done
          ' || { docker compose logs kestra; exit 1; }
          echo "Kestra is healthy."

      # Export Kestra credentials as env vars so from_deployment() can recover
      # deployments by plain name without the full JSON id payload.
      - name: Export Kestra credentials
        run: |
          echo "KESTRA_HOST=http://localhost:8090" >> "$GITHUB_ENV"
          echo "KESTRA_USER=admin@kestra.io" >> "$GITHUB_ENV"
          echo "KESTRA_PASSWORD=Kestra1234!" >> "$GITHUB_ENV"
          echo "KESTRA_NAMESPACE=metaflow" >> "$GITHUB_ENV"

      - uses: Netflix/metaflow/.github/actions/run-ux-tests@master
        with:
          metaflow-ref: master
          extra-install: "."
          use-sudo: "true"
          conda: "false"  # steps run in Kestra container which has no conda
          # Use the matrix test name as a suffix so parallel jobs don't conflict
          # on the coverage artifact name (all share the same github.job value).
          coverage-artifact-suffix: "${{ matrix.test }}"
          # Pick the -k selector with an explicit equality check on
          # scheduler_only. The previous form
          #   ${{ matrix.scheduler_only && '' || ' and deployer' }}
          # was broken: empty strings are falsy in GHA expressions, so the
          # `&& ''` branch was treated as "false" and the expression always
          # resolved to ` and deployer`. That filtered out the scheduler_only
          # tests (collected 0 items, exit code 5). The form below short-
          # circuits cleanly: when scheduler_only is true, picks matrix.test
          # alone; otherwise picks `<test> and deployer`.
          # Bumped --timeout from 300s to 900s: foreach + retry combinations
          # (test_retry_foreach, test_multibody_foreach) on the kestra
          # deployer take >5min for the deploy → trigger → poll cycle.
          # matrix.extra_filter (default empty) lets specific entries bolt
          # extra ` and not <other>` clauses onto the -k selector to disambiguate
          # tests whose names share a prefix (e.g. test_retry vs test_retry_foreach).
          pytest-args: "-v --tb=short --timeout=900 -k '${{ matrix.scheduler_only == true && matrix.test || format('{0} and deployer', matrix.test) }}${{ matrix.extra_filter }}' --cov-fail-under=0"
          # Default `test-files` is `test_basic.py test_config.py test_dag.py`,
          # which excludes test_resume_*. Without this override the
          # test_resume_hello_world / test_resume_foreach matrix entries
          # collect 0 items and exit 5.
          test-files: "test_basic.py test_config.py test_dag.py test_resume.py"
          ux-test-config: |
            backends:
              - name: kestra
                scheduler_type: kestra
                cluster: null
                decospec: null
                deploy_args:
                  kestra_host: http://localhost:8090
                  kestra_user: admin@kestra.io
                  kestra_password: Kestra1234!
                enabled: true

      - name: Dump Kestra logs
        if: always()
        run: docker compose logs --tail=200 kestra

      - name: Tear down
        if: always()
        run: docker compose down -v

  test-report:
    if: always()
    needs: [runner-tests, deployer-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all JUnit XML artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          path: junit-artifacts/

      - name: Publish combined test report
        uses: dorny/test-reporter@v1
        with:
          name: "Test Results — All Backends"
          path: "junit-artifacts/**/*.xml"
          reporter: java-junit
          fail-on-error: false
