name: UX Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"  # nightly — catches upstream metaflow regressions
  workflow_dispatch:

env:
  METAFLOW_DEFAULT_METADATA: local
  METAFLOW_DEFAULT_DATASTORE: local
  METAFLOW_DEFAULT_ENVIRONMENT: local

jobs:
  # Runner tests execute flows locally — no Kestra scheduler needed.
  runner-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Pin Metaflow local datastore root
        run: echo "METAFLOW_DATASTORE_SYSROOT_LOCAL=$HOME" >> "$GITHUB_ENV"

      - uses: Netflix/metaflow/.github/actions/run-ux-tests@npow/corral-devstack
        with:
          metaflow-ref: npow/corral-devstack
          extra-install: "."
          use-sudo: "false"
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          pytest-args: "-n 4 -v --tb=short --timeout=180 -k 'runner' --cov-fail-under=0"
          ux-test-config: |
            backends:
              - name: kestra
                scheduler_type: kestra
                cluster: null
                decospec: null
                deploy_args:
                  kestra_host: http://localhost:8090
                  kestra_user: admin@kestra.io
                  kestra_password: Kestra1234!
                enabled: true

  # Each deployer test gets its own worker with a fresh Kestra instance.
  # This eliminates serialization (xdist_group) and lets all tests run in parallel.
  deployer-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        test:
          - test_hello_world
          - test_hello_project
          - test_from_deployment
          - test_retry
          - test_resources
          - test_catch
          - test_timeout
          - test_config_simple_default
          - test_config_simple_config_value
          - test_config_simple_config
          - test_mutable_flow_default
          - test_mutable_flow_config_value
          - test_config_corner_cases
          - test_branch
          - test_foreach
          - test_multibody_foreach
          - test_condition
          - test_retry_foreach
          - test_nested_foreach
          - test_resume_hello_world
          - test_resume_foreach
        include:
          # scheduler_only tests have no exec_mode fixture so their pytest ID
          # is [kestra], not [kestra-deployer]. Drop "and deployer" for them.
          - test: test_resume_hello_world
            scheduler_only: true
          - test: test_resume_foreach
            scheduler_only: true

    env:
      COMPOSE_FILE: docker-compose.yaml:docker-compose.gha.yml
      KESTRA_HOST: http://localhost:8090
      KESTRA_USER: admin@kestra.io
      KESTRA_PASSWORD: Kestra1234!

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Pin Metaflow local datastore root
        run: echo "METAFLOW_DATASTORE_SYSROOT_LOCAL=$HOME" >> "$GITHUB_ENV"

      - name: Build Kestra Docker image
        run: docker build -t kestra-metaflow:latest -f Dockerfile.kestra-dev .

      - name: Start Kestra
        run: docker compose up -d

      - name: Wait for Kestra to be healthy
        run: |
          CONTAINER_ID=$(docker compose ps -q kestra)
          timeout 300 bash -c '
            while true; do
              STATUS=$(docker inspect --format="{{.State.Health.Status}}" '"$CONTAINER_ID"' 2>/dev/null)
              [ "$STATUS" = "healthy" ] && break
              echo "  health: $STATUS"
              sleep 10
            done
          ' || { docker compose logs kestra; exit 1; }
          echo "Kestra is healthy."

      # Export Kestra credentials as env vars so from_deployment() can recover
      # deployments by plain name without the full JSON id payload.
      - name: Export Kestra credentials
        run: |
          echo "KESTRA_HOST=http://localhost:8090" >> "$GITHUB_ENV"
          echo "KESTRA_USER=admin@kestra.io" >> "$GITHUB_ENV"
          echo "KESTRA_PASSWORD=Kestra1234!" >> "$GITHUB_ENV"
          echo "KESTRA_NAMESPACE=metaflow" >> "$GITHUB_ENV"

      - uses: Netflix/metaflow/.github/actions/run-ux-tests@npow/corral-devstack
        with:
          metaflow-ref: npow/corral-devstack
          extra-install: "."
          use-sudo: "true"
          conda: "false"  # steps run in Kestra container which has no conda
          # Use the matrix test name as a suffix so parallel jobs don't conflict
          # on the coverage artifact name (all share the same github.job value).
          coverage-artifact-suffix: "${{ matrix.test }}"
          pytest-args: "-v --tb=short --timeout=300 -k '${{ matrix.test }}${{ matrix.scheduler_only && '' || ' and deployer' }}' --cov-fail-under=0"
          ux-test-config: |
            backends:
              - name: kestra
                scheduler_type: kestra
                cluster: null
                decospec: null
                deploy_args:
                  kestra_host: http://localhost:8090
                  kestra_user: admin@kestra.io
                  kestra_password: Kestra1234!
                enabled: true

      - name: Dump Kestra logs
        if: always()
        run: docker compose logs --tail=200 kestra

      - name: Tear down
        if: always()
        run: docker compose down -v

  test-report:
    if: always()
    needs: [runner-tests, deployer-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all JUnit XML artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          path: junit-artifacts/

      - name: Publish combined test report
        uses: dorny/test-reporter@v1
        with:
          name: "Test Results — All Backends"
          path: "junit-artifacts/**/*.xml"
          reporter: java-junit
          fail-on-error: false
