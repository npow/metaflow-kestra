name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # docker compose reads COMPOSE_FILE automatically (colon-separated).
      COMPOSE_FILE: docker-compose.yaml:docker-compose.gha.yml
      # Kestra credentials (default dev values, not secrets).
      KESTRA_HOST: http://localhost:8090
      KESTRA_USER: admin@kestra.io
      KESTRA_PASSWORD: Kestra1234!
      # Force open-source Metaflow stack; no remote metadata or S3.
      METAFLOW_DEFAULT_METADATA: local
      METAFLOW_DEFAULT_DATASTORE: local
      METAFLOW_DEFAULT_ENVIRONMENT: local
      # The sysroot must point to the parent of .metaflow, which equals $HOME
      # on the GHA runner. Set explicitly so it survives the sudo boundary.
      METAFLOW_DATASTORE_SYSROOT_LOCAL: ${{ env.HOME }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -e ".[dev]"

      - name: Build Kestra Docker image
        run: docker build -t kestra-metaflow:latest -f Dockerfile.kestra-dev .

      - name: Start Kestra
        run: docker compose up -d

      - name: Wait for Kestra to be healthy
        run: |
          echo "Waiting for Kestra to become healthy (up to 5 minutes)..."
          CONTAINER_ID=$(docker compose ps -q kestra)
          timeout 300 bash -c '
            while true; do
              STATUS=$(docker inspect --format="{{.State.Health.Status}}" '"$CONTAINER_ID"' 2>/dev/null)
              [ "$STATUS" = "healthy" ] && break
              echo "  health: $STATUS"
              sleep 10
            done
          ' || { docker compose logs kestra; exit 1; }
          echo "Kestra is healthy."

      - name: Run E2E tests
        run: |
          # Kestra runs as root and Metaflow explicitly chmod 600s artifact files.
          # The GHA runner (non-root) cannot read them, so we run pytest as root.
          # sudo -E preserves the job-level env vars set above.
          sudo -E env "PATH=$PATH" "HOME=$HOME" \
            pytest tests/test_e2e.py -m integration -v --timeout=300

      - name: Dump .metaflow tree on failure
        if: failure()
        run: ls -laR "$HOME/.metaflow" 2>/dev/null || echo "(empty or missing)"

      - name: Dump Kestra logs on failure
        if: failure()
        run: docker compose logs kestra

      - name: Tear down
        if: always()
        run: docker compose down -v
