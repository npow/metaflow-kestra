name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.4"
      - name: Lint
        run: ruff check metaflow_extensions/

  test:
    needs: lint
    runs-on: ubuntu-latest
    # The "Add coverage comment to PR" step uses
    # marocchino/sticky-pull-request-comment, which calls the GitHub Issues
    # API to post/update a comment on the PR. The default GITHUB_TOKEN for
    # `pull_request` events grants pull-requests: read, so the call returns
    # 403 ("Resource not accessible by integration") and fails the job.
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests with coverage
        run: |
          # 80% threshold matches pyproject.toml [tool.coverage.report].fail_under.
          # Measured 86% as of 2026-05-09 across these five files.
          # test_compiler_inprocess.py provides direct coverage of kestra_compiler.py
          # to complement the subprocess-based test_compiler.py (which exercises
          # the same paths but is invisible to pytest-cov).
          pytest tests/test_compiler.py tests/test_adversarial.py \
            tests/test_decorator.py tests/test_deployer_unit.py \
            tests/test_compiler_inprocess.py -v \
            --cov=metaflow_extensions \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=80
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage report (HTML)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 30
      - name: Coverage summary
        if: matrix.python-version == '3.12'
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: "50 80"
      - name: Add coverage comment to PR
        if: github.event_name == 'pull_request' && matrix.python-version == '3.12'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md
